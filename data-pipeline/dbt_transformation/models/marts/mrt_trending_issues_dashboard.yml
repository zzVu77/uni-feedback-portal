version: 2

models:
  - name: mrt_trending_issues_dashboard
    description: "This mart model provides a comprehensive view for the trending issues dashboard. It joins staged Facebook posts with their corresponding AI analysis results, providing engagement metrics, sentiment analysis, and topic categorization."
    columns:
      - name: post_id
        data_type: string
        description: "Unique identifier for the Facebook post."

      - name: author
        data_type: string
        description: "The name of the post's author or page."

      - name: content
        data_type: string
        description: "The full text content of the post."

      - name: post_link
        data_type: string
        description: "Direct URL link to the original Facebook post."

      - name: posted_at
        data_type: timestamp
        description: "The date and time when the post was originally published."

      - name: reaction_count
        data_type: int64
        description: "The total number of reactions (Likes, Loves, etc.) on the post."

      - name: comment_count
        data_type: int64
        description: "The total number of comments on the post."

      - name: engagement_score
        data_type: int64
        description: "Calculated engagement metric: (reaction_count * 1) + (comment_count * 2)."

      - name: topic
        data_type: string
        description: "The main topic/category identified by AI. Defaults to 'Chưa phân tích' if AI analysis is missing."

      - name: sentiment_score
        data_type: float64
        description: "Numerical sentiment value ranging from -1 (very negative) to 1 (very positive)."

      - name: ai_summary
        data_type: string
        description: "A concise summary of the post generated by the AI model."

      - name: sentiment_label
        data_type: string
        description: "Human-readable sentiment category: 'Tiêu cực', 'Trung lập', 'Tích cực', or 'Chưa có dữ liệu'."

      - name: analyzed_at
        data_type: timestamp
        description: "The date and time when the AI analysis was performed."
