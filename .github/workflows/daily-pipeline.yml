name: Uni Feedback Daily Pipeline

on:
  schedule:
    # todo: will adjust time later, run every week at 7pm (Vietnam time) to have fresh data for Monday morning meetings
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download code from server
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js (for Crawler & Loader)
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: 🐍 Set up Python (for dbt & AI Gemini)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install Node.js packages
        working-directory: ./data-pipeline/crawler
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: 📦 Install Python libraries
        run: |
          cd data-pipeline
          pip install -r requirements.txt

      - name: 🔑 Configure BigQuery service account file
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          # Create a temporary file for the service account key
          echo "$GCP_CREDENTIALS" > ./google-service-account.json

      - name: 🔑 Configure Facebook Auth State
        env:
          FB_AUTH_JSON: ${{ secrets.FB_AUTH_JSON }}
        run: |
          # Tạo file auth.json từ GitHub Secrets vào đúng thư mục crawler cần
          # (Hãy điều chỉnh lại đường dẫn ./data-pipeline/auth.json nếu code bạn để chỗ khác)
          echo "$FB_AUTH_JSON" > ./data-pipeline/auth.json

      - name: 🚀 Activate the Entire Pipeline (Prefect Flow)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Declare the path to the key file for dbt and Google Cloud library to know
          GOOGLE_APPLICATION_CREDENTIALS: ./google-service-account.json
        run: |
          # Run the Prefect flow which orchestrates the entire pipeline
          python data-pipeline/prefect-flow/run_pipeline.py
